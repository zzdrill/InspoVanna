        async function generateImage() {
            const prompt = document.getElementById('image-prompt')?.value;

            if (!prompt) {
                showToast('请输入图像描述', 'error');
                return;
            }

            if (!state.arkApiKey) {
                showToast('请先配置火山方舟 API Key', 'error');
                showPage('settings');
                return;
            }

            // Auto-detect mode based on reference image count
            const refCount = state.imageRefImages.length;
            let mode;
            if (refCount === 0) mode = 'text2img';
            else if (refCount === 1) mode = 'img2img';
            else mode = 'fusion';

            const size = document.getElementById('image-size')?.value || '1024x1024';
            const batch = document.getElementById('image-batch')?.value || 'disabled';
            const count = parseInt(document.getElementById('image-count')?.value) || 1;
            const model = document.getElementById('image-model-select')?.value || state.imageModel;

            const subdir = state.currentProject ? `${state.currentProject}/Image` : 'images';

            const isSingleMode = batch === 'disabled';

            // Build request body for one API call
            function buildRequestBody() {
                const body = {
                    model: model,
                    prompt: prompt,
                    size: size,
                    response_format: "url"
                };

                if (isSingleMode) {
                    body.sequential_image_generation = 'disabled';
                } else {
                    body.sequential_image_generation = 'auto';
                    body.sequential_image_generation_options = { max_images: count };
                }

                if (mode === 'img2img' && state.imageRefImages.length > 0) {
                    body.image = state.imageRefImages[0].url;
                } else if (mode === 'fusion' && state.imageRefImages.length > 0) {
                    body.image = state.imageRefImages.map(img => img.url);
                }

                // Seedream 5.0 Lite internet search mode
                if (model === SEEDREAM_5_LITE_ID && state.imageInternetMode) {
                    body.tools = [{ type: 'web_search' }];
                }

                return body;
            }

            // Single mode: loop N calls; Group mode: 1 call with max_images
            const apiCallCount = isSingleMode ? count : 1;
            let totalSaved = 0;

            // Init preview grid with loading spinners
            initPreviewGrid(count);

            try {
                for (let callIdx = 0; callIdx < apiCallCount; callIdx++) {
                    const requestBody = buildRequestBody();
                    const response = await fetch('/api/ark/image-gen', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`API错误 (${response.status}): ${errorText}`);
                    }

                    const data = await response.json();

                    if (data.error) {
                        throw new Error(data.error.message || JSON.stringify(data.error));
                    }

                    if (!data.data || data.data.length === 0) {
                        throw new Error('API未返回图像数据');
                    }

                    // Process generated images and save to local workspace
                    for (const img of data.data) {
                        const imageUrl = img.url || (img.b64_json ? `data:image/png;base64,${img.b64_json}` : null);
                        if (!imageUrl) continue;

                        const filename = `image_${new Date().toISOString().replace(/[:.]/g, '-')}_${totalSaved}.png`;

                        let serveUrl = imageUrl;
                        try {
                            const saveResp = await fetch('/api/workspace/save', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ url: imageUrl, filename: filename, subdir: subdir })
                            });
                            if (saveResp.ok) {
                                const saveData = await saveResp.json();
                                serveUrl = saveData.serveUrl;
                                fetch('/api/workspace/save-prompt', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({subdir, filename, prompt})
                                }).catch(() => {});
                            }
                        } catch (e) {
                            console.warn('Failed to save to workspace, using original URL:', e);
                        }

                        const result = {
                            id: Date.now().toString() + '_' + totalSaved,
                            type: 'image',
                            name: filename,
                            prompt: prompt,
                            mode: mode,
                            size: size,
                            url: serveUrl,
                            createdAt: new Date().toISOString()
                        };

                        state.generations.push(result);
                        state.files.push(result);

                        // Fill preview slot immediately
                        fillPreviewSlot(totalSaved, serveUrl);
                        totalSaved++;
                    }
                }

                saveToStorage();
                state.imageRefImages = [];

                finalizePreview(totalSaved, subdir);
                showToast(`成功生成 ${totalSaved} 张图像！`, 'success');
            } catch (error) {
                console.error('Image generation error:', error);
                showToast(`图像生成失败：${error.message}`, 'error');
                if (totalSaved > 0) {
                    saveToStorage();
                }
            }
        }
        async function generateText() {
            const input = document.getElementById('text-input')?.value;
            if ((!input && state.uploadedImages.length === 0 && state.uploadedVideos.length === 0 && state.uploadedDocuments.length === 0)) {
                showToast('请输入内容或上传文件', 'error');
                return;
            }

            if (!state.arkApiKey) {
                showToast('请先配置火山方舟 API Key', 'error');
                showPage('settings');
                return;
            }

            // Auto-create conversation if none selected
            if (!state.currentConversationId) {
                createNewConversation(false);
            }

            const conv = state.conversations.find(c => c.id === state.currentConversationId);
            if (!conv) {
                showToast('对话不存在', 'error');
                return;
            }

            // Add user message
            const userMessage = {
                role: 'user',
                content: input,
                images: [...state.uploadedImages],
                videos: [...state.uploadedVideos],
                documents: [...state.uploadedDocuments],
                timestamp: new Date().toISOString()
            };
            conv.messages.push(userMessage);

            // Update conversation title from first user message (first 10 chars)
            const userMsgCount = conv.messages.filter(m => m.role === 'user').length;
            if (userMsgCount === 1) {
                const titleText = (input || '文件消息').substring(0, 10);
                conv.title = titleText + (input && input.length > 10 ? '...' : '');
            }

            // Clear input and uploaded files
            document.getElementById('text-input').value = '';
            state.uploadedImages = [];
            state.uploadedVideos = [];
            state.uploadedDocuments = [];

            // Update UI with user message and loading indicator
            state.isGenerating = true;
            showPage('text');
            scrollChatToBottom();

            try {
                // Call Volcano ARK API with conversation messages
                const response = await callVolcanoMultimodalAPI(conv.messages);

                if (response) {
                    const assistantMessage = {
                        role: 'assistant',
                        content: response.content || '回复生成成功',
                        reasoning: response.reasoning || '',
                        timestamp: new Date().toISOString()
                    };
                    conv.messages.push(assistantMessage);
                    saveConversations();
                } else {
                    throw new Error('API返回为空');
                }
            } catch (error) {
                const errorMessage = {
                    role: 'assistant',
                    content: `生成失败：${error.message}`,
                    timestamp: new Date().toISOString()
                };
                conv.messages.push(errorMessage);
                saveConversations();
                showToast(`生成失败：${error.message}`, 'error');
            }

            // Remove loading indicator and show final result
            state.isGenerating = false;
            showPage('text');
            scrollChatToBottom();
        }

        async function callVolcanoMultimodalAPI(messages) {
            // 检查是否配置了模型
            if (!state.currentModel) {
                throw new Error('请先在设置页面配置模型ID');
            }

            // 火山方舟API端点 - 通过本地后端代理
            const endpoint = '/api/ark/responses';

            // Build input array from all conversation messages
            const input = [];
            for (const msg of messages) {
                const content = [];

                // Add images
                if (msg.images && msg.images.length > 0) {
                    for (const img of msg.images) {
                        const imageUrl = img.url || img;
                        content.push({
                            type: 'input_image',
                            image_url: imageUrl
                        });
                    }
                }

                // Add videos
                if (msg.videos && msg.videos.length > 0) {
                    for (const vid of msg.videos) {
                        content.push({
                            type: 'input_video',
                            file_id: vid.fileId
                        });
                    }
                }

                // Add documents
                if (msg.documents && msg.documents.length > 0) {
                    for (const doc of msg.documents) {
                        if (doc.fileId) {
                            // Non-text file uploaded to ARK: use input_file type
                            content.push({
                                type: 'input_file',
                                file_id: doc.fileId
                            });
                        } else if (doc.content) {
                            // Plain text document
                            content.push({
                                type: 'input_text',
                                text: `[文件: ${doc.name}]\n${doc.content}`
                            });
                        }
                    }
                }

                // Add text
                if (msg.content) {
                    content.push({
                        type: 'input_text',
                        text: msg.content
                    });
                }

                if (content.length > 0) {
                    input.push({
                        role: msg.role,
                        content: content
                    });
                }
            }

            const requestData = {
                model: state.currentModel,
                input: input
            };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API错误 (${response.status}): ${errorText}`);
                }

                const data = await response.json();

                // 解析响应 - responses API返回格式
                let resultText = '';
                let reasoningText = '';

                // 从output数组中提取内容
                if (data.output && Array.isArray(data.output)) {
                    for (const item of data.output) {
                        if (item.type === 'message' && item.content) {
                            for (const c of item.content) {
                                if (c.type === 'output_text') {
                                    resultText += c.text;
                                }
                            }
                        }
                        if (item.type === 'reasoning' && item.summary) {
                            for (const s of item.summary) {
                                if (s.type === 'summary_text' && s.text) {
                                    reasoningText += s.text;
                                }
                            }
                        }
                    }
                }

                // fallback
                if (!resultText) {
                    resultText = data.output_text
                        || (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content)
                        || JSON.stringify(data);
                }

                return { content: resultText, reasoning: reasoningText };
            } catch (error) {
                console.error('Volcano API Error:', error);
                throw error;
            }
        }

        async function handleTextFileUpload(input) {
            const files = input.files;
            if (!files || files.length === 0) return;

            const hasUpload = Array.from(files).some(f => f.type.startsWith('image/') || f.type.startsWith('video/') || !f.type.startsWith('text/'));
            if (hasUpload) _setTextSendBtn(true, '上传中...');
            showPage('text');

            const textExtensions = ['.txt','.md','.json','.csv','.xml','.html','.css','.js','.py','.java','.c','.cpp','.h','.go','.rs','.ts','.yaml','.yml','.toml','.ini','.cfg','.log','.sql','.sh','.bat','.ps1','.rb','.php','.swift','.kt','.dart','.lua','.r','.tex','.bib'];

            for (const file of files) {
                try {
                    if (file.type.startsWith('image/')) {
                        const previewUrl = URL.createObjectURL(file);
                        const formData = new FormData();
                        formData.append('file', file);
                        const resp = await fetch('/api/tos/upload', { method: 'POST', body: formData });
                        if (!resp.ok) throw new Error(`Upload failed (${resp.status})`);
                        const data = await resp.json();
                        state.uploadedImages.push({ url: data.url, key: data.key, preview: previewUrl });
                    } else if (file.type.startsWith('video/')) {
                        const previewUrl = URL.createObjectURL(file);
                        showToast(`正在上传视频 ${file.name}...`, 'info');
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('preprocess_configs', JSON.stringify({ video: { fps: 0.3 } }));
                        const resp = await fetch('/api/ark/file-upload', { method: 'POST', body: formData });
                        if (!resp.ok) {
                            const err = await resp.json().catch(() => ({}));
                            throw new Error(err.error || `Upload failed (${resp.status})`);
                        }
                        const data = await resp.json();
                        if (data.status === 'failed') throw new Error('视频处理失败');
                        state.uploadedVideos.push({ fileId: data.id, preview: previewUrl });
                    } else {
                        const ext = '.' + file.name.split('.').pop().toLowerCase();
                        if (textExtensions.includes(ext) || file.type.startsWith('text/')) {
                            // Plain text: read content directly
                            const content = await file.text();
                            if (content) {
                                state.uploadedDocuments.push({ name: file.name, content: content.substring(0, 50000) });
                            }
                        } else {
                            // Non-text document (PDF, etc.): upload to ARK Files API
                            showToast(`正在上传 ${file.name}...`, 'info');
                            const formData = new FormData();
                            formData.append('file', file);
                            const resp = await fetch('/api/ark/file-upload', { method: 'POST', body: formData });
                            if (!resp.ok) {
                                const err = await resp.json().catch(() => ({}));
                                throw new Error(err.error || `Upload failed (${resp.status})`);
                            }
                            const data = await resp.json();
                            state.uploadedDocuments.push({ name: file.name, fileId: data.id });
                        }
                    }
                } catch (error) {
                    showToast(`文件上传失败: ${error.message}`, 'error');
                }
            }

            input.value = '';
            _setTextSendBtn(false, '发送');
            showPage('text');
        }

                const needUpload = type === 'image' || type === 'video';

                showPage('text');

                if (type === 'image') {

                        const formData = new FormData();
                        formData.append('file', blob, file.name);
                        const resp = await fetch('/api/tos/upload', { method: 'POST', body: formData });
                        if (resp.ok) {
                            const data = await resp.json();
                            state.uploadedImages.push({ url: data.url, key: data.key, preview: serveUrl });
                        } else {
                            state.uploadedImages.push({ url: serveUrl, preview: serveUrl });
                        }
                    } catch (e) {
                        state.uploadedImages.push({ url: serveUrl, preview: serveUrl });
                    }
                } else if (type === 'video') {
                    try {
                        const blob = await fetch(serveUrl).then(r => r.blob());
                        const formData = new FormData();
                        formData.append('file', blob, file.name);
                        formData.append('preprocess_configs', JSON.stringify({ video: { fps: 0.3 } }));
                        const resp = await fetch('/api/ark/file-upload', { method: 'POST', body: formData });
                        if (resp.ok) {
                            const data = await resp.json();
                            state.uploadedVideos.push({ fileId: data.id, preview: serveUrl });
                        } else {
                            showToast('视频上传失败', 'error');
                        }
                    } catch (e) {
                        showToast('视频上传失败', 'error');
                    }
                } else {
                    try {
                        const apiPath = encodeURIComponent(serveUrl.replace('/workspace/', ''));
                        const resp = await fetch(`/api/workspace/read?path=${apiPath}`);
                        if (resp.ok) {
                            const data = await resp.json();
                            if (data.content) {
                                state.uploadedDocuments.push({ name: file.name, content: data.content.substring(0, 50000) });
                            }
                        }
                    } catch (e) {
                        showToast('文档读取失败', 'error');
                    }
                }

                if (needUpload) _setTextSendBtn(false, '发送');
                showPage('text');
                showToast(`已添加：${file.name}`, 'success');
            });
        }

                reader.onload = (e) => {

                    preview.classList.remove('hidden');
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview" class="max-h-48 mx-auto mb-2 rounded-lg">`;

                reader.readAsDataURL(file);

        function handleMultipleImageUpload(input, previewId) {
            const files = input.files;
            const preview = document.getElementById(previewId);
            preview.innerHTML = '';

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.innerHTML = `<img src="${e.target.result}" alt="Preview" class="w-full h-24 object-cover rounded-lg">`;
                    preview.appendChild(div);

                reader.readAsDataURL(file);

        // ========== Batch Operations ==========
        function toggleBatchMode() {
            window._batchMode = !window._batchMode;
            window._batchSelected = [];
            updateBatchUI();
        }

        function updateBatchUI() {
            const bar = document.getElementById('batch-bar');
            const btn = document.getElementById('batch-toggle-btn');
            if (!bar || !btn) return;

            if (window._batchMode) {
                bar.classList.remove('hidden');
                bar.classList.add('flex');
                btn.classList.add('hidden');
                document.querySelectorAll('.batch-checkbox').forEach(cb => cb.classList.remove('hidden'));
                document.querySelectorAll('.batch-item').forEach(item => {
                    item.classList.remove('border-purple-500', 'bg-purple-50');
                    item.querySelector('input[type=checkbox]').checked = false;
                });
            } else {
                bar.classList.add('hidden');
                bar.classList.remove('flex');
                btn.classList.remove('hidden');
                document.querySelectorAll('.batch-checkbox').forEach(cb => cb.classList.add('hidden'));
                document.querySelectorAll('.batch-item').forEach(item => {
                    item.classList.remove('border-purple-500', 'bg-purple-50');
                    item.querySelector('input[type=checkbox]').checked = false;
                });
            }
            updateBatchCount();
        }

        function toggleBatchSelect(itemEl, path) {
            const cb = itemEl.querySelector('input[type=checkbox]');
            const idx = window._batchSelected.indexOf(path);
            if (idx >= 0) {
                window._batchSelected.splice(idx, 1);
                cb.checked = false;
                itemEl.classList.remove('border-purple-500', 'bg-purple-50');
            } else {
                window._batchSelected.push(path);
                cb.checked = true;
                itemEl.classList.add('border-purple-500', 'bg-purple-50');
            }
            updateBatchCount();
        }

        function updateBatchCount() {
            const el = document.getElementById('batch-count');
            if (el) el.textContent = window._batchSelected.length + ' 项';
        }

        function batchDelete() {
            if (window._batchSelected.length === 0) {
                showToast('请先选择文件', 'warning');
                return;

            showModal(`
                <div class="p-6">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">批量删除</h3>
                    <p class="text-sm text-gray-600 mb-4">确定要删除选中的 ${window._batchSelected.length} 个文件吗？此操作不可撤销。</p>

                    </div>
                </div>
            `);
        }

        async function doBatchDelete() {
            closeModal();
            let ok = 0, fail = 0;
            for (const path of window._batchSelected) {
                try {
                    const resp = await fetch('/api/workspace/delete', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({path: path})
                    });
                    if (resp.ok) ok++; else fail++;
                } catch { fail++; }
            }
            window._batchSelected = [];
            window._batchMode = false;
            showToast(`已删除 ${ok} 个文件${fail > 0 ? '，' + fail + ' 个失败' : ''}`, fail > 0 ? 'warning' : 'success');
            browseWorkspace((state.browsePath || []).join('/'));

                const folders = data.folders || [];
                const escaped = (parentPath || '').replace(/'/g, "\\'");
                let html = '';
                folders.forEach(f => {
                    const subPath = parentPath ? parentPath + '/' + f.name : f.name;
                    const subEscaped = subPath.replace(/'/g, "\\'");
                    html += `<div class="fp-item p-2 hover:bg-gray-50 rounded cursor-pointer text-gray-700 flex items-center" data-path="${subPath}" onclick="selectFolderItem(this,'${subEscaped}')">

                    </div>
                    <div class="fp-children hidden pl-4" data-parent="${subPath}"></div>`;
                });
                container.innerHTML = html || '<p class="text-gray-400 text-sm p-2">暂无文件夹</p>';
            });

        function selectFolderItem(el, path) {
            window._folderPickerSelected = path;
            highlightFolderPickerItem(el);
            updateFolderPickerConfirm();

            // Toggle expand children
            const childrenDiv = el.nextElementSibling;
            if (!childrenDiv || !childrenDiv.classList.contains('fp-children')) return;
            if (!childrenDiv.classList.contains('hidden')) {
                childrenDiv.classList.add('hidden');
                return;
            }
            // Load sub-folders
            if (childrenDiv.innerHTML) {
                childrenDiv.classList.remove('hidden');
                return;
            }
            fetch('/api/workspace/browse?path=' + encodeURIComponent(path)).then(r => r.json()).then(data => {
                const folders = data.folders || [];
                if (folders.length === 0) return;
                let html = '';
                folders.forEach(f => {
                    const subPath = path + '/' + f.name;
                    const subEscaped = subPath.replace(/'/g, "\\'");
                    html += `<div class="fp-item p-2 hover:bg-gray-50 rounded cursor-pointer text-gray-700 flex items-center" data-path="${subPath}" onclick="selectFolderItem(this,'${subEscaped}')">
                        <svg class="w-4 h-4 mr-2 text-yellow-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                        <span class="flex-1 truncate">${f.name}</span>
                        <svg class="w-3 h-3 ml-1 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </div>

                childrenDiv.innerHTML = html;
                childrenDiv.classList.remove('hidden');
            });

            if (!relPath && state.currentProject) {

            state.browsePath = segments;

            try {

                    state.browseData = await resp.json();

        function fetchAndShowPrompt(url) {
            if (!url || !url.startsWith('/workspace/')) return;
            const promptPath = url.substring('/workspace/'.length);
            fetch('/api/workspace/prompt?path=' + encodeURIComponent(promptPath))
                .then(r => r.ok ? r.json() : {prompt: ''})
                .then(data => {
                    const el = document.getElementById('prompt-display');
                    if (!el || !data.prompt) return;
                    const escaped = data.prompt.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
                    window._currentPrompt = data.prompt;
                    el.innerHTML = '<div class="bg-purple-50 rounded-lg p-3">' +
                        '<div class="flex items-center justify-between mb-1"><span class="text-xs text-purple-500 font-medium">提示词</span>' +
                        '<div class="flex gap-1">' +
                        '<button onclick="copyPrompt()" class="text-xs px-2 py-0.5 bg-white border border-purple-200 text-purple-600 rounded hover:bg-purple-100">复制</button>' +
                        '<button onclick="savePromptToText(window._currentPrompt)" class="text-xs px-2 py-0.5 bg-white border border-purple-200 text-purple-600 rounded hover:bg-purple-100">保存到工作空间</button>' +
                        '</div></div>' +
                        '<div class="text-sm text-gray-700 whitespace-pre-wrap">' + escaped + '</div></div>';
                })
                .catch(() => {});
        }

        function savePromptToText(prompt) {
            const subdir = state.currentProject ? state.currentProject + '/Text' : 'Text';
            const filename = 'prompt_' + new Date().toISOString().replace(/[:.]/g, '-') + '.txt';
            fetch('/api/workspace/save-text', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: prompt, filename: filename, subdir: subdir})
            })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(() => showToast('提示词已保存到工作空间', 'success'))
            .catch(() => showToast('保存失败', 'error'));
        }

        function previewWorkspaceFile(url, name, type) {
            const isImage = type && type.startsWith('image/');
            const isVideo = type && type.startsWith('video/');
            const isText = type && (type.startsWith('text/') || name.endsWith('.txt') || name.endsWith('.md') || name.endsWith('.json') || name.endsWith('.log'));
            showModal(`
                <div class="p-6 max-w-3xl">

                        <video src="${url}" controls autoplay class="max-w-full max-h-[60vh] mx-auto rounded-lg mb-4"></video>
                    ` : isText ? `
                        <div id="text-preview" class="bg-gray-50 rounded-lg p-4 mb-4 max-h-[60vh] overflow-auto text-sm text-gray-700 whitespace-pre-wrap font-mono">加载中...</div>

                        <div class="aspect-video bg-gray-100 rounded-lg flex items-center justify-center mb-4">

                    `}
                    </div>
                    <div id="prompt-display" class="mb-4"></div>
                </div>
            `);

            if (isText && url && url.startsWith('/workspace/')) {
                const textPath = url.substring('/workspace/'.length);
                fetch('/api/workspace/read?path=' + encodeURIComponent(textPath))
                    .then(r => r.ok ? r.json() : null)
                    .then(data => {
                        const el = document.getElementById('text-preview');
                        if (el && data && data.content !== undefined) {
                            el.textContent = data.content;
                        } else if (el) {
                            el.textContent = '读取失败';
                        }
                    })
                    .catch(() => {
                        const el = document.getElementById('text-preview');
                        if (el) el.textContent = '读取失败';
                    });
            }

            fetchAndShowPrompt(url);
        }

        function formatFileSize(bytes) {
            if (!bytes) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            let size = bytes;
            while (size >= 1024 && i < units.length - 1) {
                size /= 1024;
                i++;
            }
            return size.toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
        }

                    method: 'POST',

                const protectedFolders = ['Image', 'Text', 'Video'];
                const parts = itemPath.replace(/\\/g, '/').split('/');
                const folderName = parts[parts.length - 1];
                if (protectedFolders.includes(folderName)) {
                    showToast(`文件夹 "${folderName}" 为系统保留文件夹，不可删除`, 'warning');
                    return;
                }
            }

            // For folders, first check if it's empty
            if (isFolder) {
                try {
                    const checkResp = await fetch('/api/workspace/browse?path=' + encodeURIComponent(itemPath));
                    if (checkResp.ok) {
                        const checkData = await checkResp.json();
                        if (checkData.folders.length > 0 || checkData.files.length > 0) {
                            showModal(`
                                <div class="p-6">
                                    <h3 class="text-xl font-bold text-gray-900 mb-4">文件夹非空</h3>
                                    <p class="text-gray-600 mb-4">文件夹 "${name}" 包含 ${checkData.folders.length} 个子文件夹和 ${checkData.files.length} 个文件，删除后无法恢复。</p>

                                        <button onclick="confirmDelete('${itemPath}', '${name}', true)" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-opacity">
                                            确认删除

                                            取消
                                        </button>
                                    </div>
                                </div>
                            `);
                            return;
                        }
                    }
                } catch (e) {}
            }

            const msg = isFolder ? `确定删除文件夹 "${name}" 吗？` : `确定删除文件 "${name}" 吗？`;
            if (!confirm(msg)) return;

            try {
                const resp = await fetch('/api/workspace/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: itemPath })
                });
                if (!resp.ok) {

        // ========== Drag and Drop ==========
        let _dragOccurred = false;

        function onDragStart(event, itemPath, isFolder) {
            event.dataTransfer.setData('text/plain', JSON.stringify({ path: itemPath, isFolder: isFolder }));
            event.dataTransfer.effectAllowed = 'move';
            _dragOccurred = true;
            event.target.style.opacity = '0.5';
        }

        function onDragEnd(event) {
            event.target.style.opacity = '1';
            setTimeout(() => { _dragOccurred = false; }, 0);
        }

        function onDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const el = event.currentTarget;
            if (!el._dragCounter) el._dragCounter = 0;
            el._dragCounter++;
            el.classList.add('ring-2', 'ring-purple-400', 'bg-purple-50');
        }

        function onDragLeave(event) {
            const el = event.currentTarget;
            if (!el._dragCounter) el._dragCounter = 0;
            el._dragCounter--;
            if (el._dragCounter <= 0) {
                el._dragCounter = 0;
                el.classList.remove('ring-2', 'ring-purple-400', 'bg-purple-50');
            }
        }

        async function onDrop(event, destFolderPath) {
            event.preventDefault();
            event.stopPropagation();
            const el = event.currentTarget;
            el._dragCounter = 0;
            el.classList.remove('ring-2', 'ring-purple-400', 'bg-purple-50');

            let dragData;
            try { dragData = JSON.parse(event.dataTransfer.getData('text/plain')); }
            catch (e) { return; }

            if (dragData.path === destFolderPath) return;
            if (destFolderPath.startsWith(dragData.path + '/')) {
                showToast('不能将文件夹移入其自身的子文件夹', 'warning');
                return;
            }

            try {
                const resp = await fetch('/api/workspace/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source: dragData.path, destDir: destFolderPath })
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.error || 'Failed');
                }
                browseWorkspace((state.browsePath || []).join('/'));
                showToast('移动成功', 'success');
            } catch (error) {
                showToast(`移动失败: ${error.message}`, 'error');
            }
        }

        async function handleWorkspaceUpload(input) {
            const files = input.files;
            if (!files || files.length === 0) return;
            const fullSubdir = (state.browsePath || []).join('/');
            const project = state.currentProject;
            if (!project) { showToast('请先选择项目', 'warning'); return; }

            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('project', project);
                formData.append('subdir', fullSubdir);
                try {
                    const resp = await fetch('/api/workspace/upload', { method: 'POST', body: formData });
                    if (!resp.ok) throw new Error('upload failed');
                } catch (e) {
                    showToast('upload ' + file.name + ' failed: ' + e.message, 'error');
                }
            }
            showToast('uploaded ' + files.length + ' files', 'success');
            input.value = '';
            browseWorkspace(fullSubdir || project);
        }

                    <h3 class="text-xl font-bold text-gray-900 mb-4">移动文件</h3>
                    <div class="space-y-2 max-h-96 overflow-y-auto">
                        <button onclick="confirmMoveFile('${fileId}', null)" class="w-full px-4 py-2 text-left hover:bg-gray-100 rounded-lg flex items-center">
                            <svg class="w-5 h-5 mr-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                            </svg>
                            根目录
                        </button>
                        ${state.folders.map(folder => `
                            <button onclick="confirmMoveFile('${fileId}', '${folder.id}')" class="w-full px-4 py-2 text-left hover:bg-gray-100 rounded-lg flex items-center">
                                <svg class="w-5 h-5 mr-3 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                                </svg>
                                ${folder.name}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `);
        }

        function confirmMoveFile(fileId, folderId) {
            const file = state.files.find(f => f.id === fileId);
            if (file) {
                file.folderId = folderId;
                saveToStorage();
                showPage('workspace');
                showToast('文件已移动', 'success');
            }
            closeModal();
        }

        function setViewMode(mode) {
            showToast('视图模式功能开发中', 'info');
        }

        // ========== Config File Functions ==========
        function applyConfig(config) {
            // Apply config to state (session only, no localStorage for keys)
            let settings = null;
            if (config.volcano) {
                settings = {
                    arkApiKey: config.volcano.ark_api_key,
                    tosAk: config.volcano.tos_ak,
                    tosSk: config.volcano.tos_sk,
                    tosRegion: config.volcano.tos_region,
                    tosBucket: config.volcano.tos_bucket,
                    workspacePath: config.workspace?.path,
                    textModel: config.models?.text_default,
                    textModels: config.models?.text_models,
                    imageModel: config.models?.image_default,
                    imageModels: config.models?.image_models,
                    videoModel: config.models?.video_default,
                    videoModels: config.models?.video_models
                };
            } else if (config.settings) {
                settings = config.settings;
            } else {
                return false;
            }

            // Sensitive fields may be booleans (true/false) from the safe config endpoint,
            // or real string values from imported config files.
            // Booleans are enough for status display; actual API calls go through backend proxies.
            if (settings.arkApiKey !== undefined && settings.arkApiKey !== null) state.arkApiKey = settings.arkApiKey;
            if (settings.tosAk !== undefined && settings.tosAk !== null) state.tosAk = settings.tosAk;
            if (settings.tosSk !== undefined && settings.tosSk !== null) state.tosSk = settings.tosSk;
            if (settings.tosRegion) state.tosRegion = settings.tosRegion;
            if (settings.tosBucket !== undefined) state.tosBucket = settings.tosBucket;
            if (settings.workspacePath !== undefined) state.workspacePath = settings.workspacePath;
            if (settings.textModel) state.textModel = settings.textModel;
            if (settings.textModels && typeof settings.textModels === 'object') state.textModels = settings.textModels;
            if (settings.textModel) state.currentModel = settings.textModel;
            if (settings.imageModel) state.imageModel = settings.imageModel;
            if (settings.imageModels && typeof settings.imageModels === 'object') state.imageModels = settings.imageModels;
            if (settings.videoModel) state.videoModel = settings.videoModel;
            if (settings.videoModels && typeof settings.videoModels === 'object') state.videoModels = settings.videoModels;

            updateApiStatus();
            return true;
        }

        function importConfigFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const config = JSON.parse(e.target.result);

                    if (!applyConfig(config)) {
                        showToast('配置文件格式错误，请使用 config.json', 'error');
                        return;
                    }

                    try {
                        await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config) });
                        showToast('配置文件已导入并生效', 'success', 5000);
                    } catch (e) {
                        showToast('前端已加载，后端同步失败', 'warning', 5000);
                    }
                    showPage('settings');
                } catch (error) {
                    showToast('无法解析配置文件，请确保文件格式正确', 'error');
                    console.error('Config import error:', error);
                }
            };

            reader.readAsText(file);
            event.target.value = '';
        }

        async function browseDirPicker() {
            const modal = document.createElement('div');
            modal.id = 'dir-picker-modal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-2xl shadow-2xl flex flex-col" style="width:500px; height:450px;">
                    <div class="flex items-center justify-between p-4 border-b flex-shrink-0">
                        <h3 class="text-lg font-semibold text-gray-800">选择文件夹</h3>
                        <button onclick="document.getElementById('dir-picker-modal').remove()" class="text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <div id="dir-picker-breadcrumb" class="px-4 py-2 bg-gray-50 text-xs text-gray-500 border-b flex-shrink-0 font-mono truncate"></div>
                    <div id="dir-picker-list" class="flex-1 overflow-y-auto p-2 space-y-0.5"></div>
                    <div class="flex items-center justify-between p-4 border-t flex-shrink-0">
                        <input id="dir-picker-input" type="text" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono mr-3" placeholder="输入路径..." readonly>
                        <button id="dir-picker-ok" class="px-4 py-2 bg-purple-600 text-white text-sm rounded-lg hover:bg-purple-700 transition-colors disabled:opacity-50" disabled>确定</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

            const listEl = document.getElementById('dir-picker-list');
            const breadcrumbEl = document.getElementById('dir-picker-breadcrumb');
            const inputEl = document.getElementById('dir-picker-input');
            const okBtn = document.getElementById('dir-picker-ok');

            async function loadDir(dirPath) {
                listEl.innerHTML = '<p class="text-gray-400 text-center py-8">加载中...</p>';
                try {
                    const resp = await fetch('/api/workspace/browse-dir' + (dirPath ? `?path=${encodeURIComponent(dirPath)}` : ''));
                    if (!resp.ok) throw new Error(`请求失败 (${resp.status})`);
                    const data = await resp.json();
                    inputEl.value = data.current || '';
                    okBtn.disabled = !data.current;

                    // Breadcrumb
                    if (data.current) {
                        breadcrumbEl.textContent = data.current;
                    } else {
                        breadcrumbEl.textContent = '选择驱动器';
                    }

                    let html = '';
                    // Parent directory link
                    if (data.parent !== undefined && data.parent !== '' && data.parent !== data.current) {
                        html += `<div class="flex items-center space-x-2 px-3 py-2 rounded-lg hover:bg-purple-50 cursor-pointer text-sm text-gray-500" onclick="this.dataset.action='navigate';this.dataset.path='${data.parent.replace(/\\/g, '\\\\')}'">
                            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/></svg>
                            <span>..</span>
                        </div>`;
                    }
                    for (const d of (data.dirs || [])) {
                        const escapedPath = d.path.replace(/\\/g, '\\\\');
                        html += `<div class="flex items-center space-x-2 px-3 py-2 rounded-lg hover:bg-purple-50 cursor-pointer text-sm text-gray-700" data-action="navigate" data-path="${escapedPath}">
                            <svg class="w-4 h-4 text-yellow-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>
                            <span class="truncate">${d.name}</span>
                        </div>`;
                    }
                    if (!data.dirs || data.dirs.length === 0) {
                        html = '<p class="text-gray-400 text-center py-8">该目录为空</p>';
                    }
                    listEl.innerHTML = html;
                } catch (e) {
                    listEl.innerHTML = `<p class="text-red-400 text-center py-8">加载失败：${e.message}</p>`;
                }
            }

            listEl.addEventListener('click', (e) => {
                const item = e.target.closest('[data-action="navigate"]');
                if (item) loadDir(item.dataset.path);
            });

            okBtn.addEventListener('click', () => {
                const selectedPath = inputEl.value;
                if (selectedPath) {
                    const pathInput = document.getElementById('workspace-path-input');
                    if (pathInput) pathInput.value = selectedPath;
                }
                modal.remove();
            });

            // Start with drives
            loadDir('');
        }

        async function saveWorkspacePath() {
            const newPath = document.getElementById('workspace-path-input')?.value?.trim();
            if (!newPath) {
                showToast('Please enter a workspace path', 'error');
                return;
            }

            try {
                const resp = await fetch('/api/workspace/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: newPath })
                });

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.error || `Failed (${resp.status})`);
                }

                const data = await resp.json();
                state.workspacePath = data.path;
                showToast(`Workspace path updated: ${data.path}`, 'success');
                showPage('settings');
            } catch (error) {
                showToast(`Failed to set workspace: ${error.message}`, 'error');
            }
        }

        // ========== Storage Functions ==========
        function saveToStorage() {
            localStorage.setItem('workspace_files', JSON.stringify(state.files));
            localStorage.setItem('workspace_folders', JSON.stringify(state.folders));
        }

        // ========== Initialize ==========
        async function init() {
            // Clear sensitive keys from localStorage (session-only storage)
            localStorage.removeItem('volcano_ark_api_key');
            localStorage.removeItem('volcano_tos_ak');
            localStorage.removeItem('volcano_tos_sk');
            state.arkApiKey = '';
            state.tosAk = '';
            state.tosSk = '';

            // Clean up old data
            localStorage.removeItem('chat_history');
            const storedModel = localStorage.getItem('model_vision');
            if (storedModel && (storedModel === 'doubao-pro-4k' || storedModel === 'doubao-pro-4k-240628' || storedModel.startsWith('ep-'))) {
                localStorage.removeItem('model_vision');
                state.textModel = 'doubao-seed-2-0-pro-260215';
            }

            // Validate currentConversationId
            if (state.currentConversationId) {
                const exists = state.conversations.find(c => c.id === state.currentConversationId);
                if (!exists) {
                    state.currentConversationId = state.conversations.length > 0 ? state.conversations[0].id : null;
                }
            }

            // Auto-load config from server (reads config.json from root directory)
            try {
                const resp = await fetch('/api/config');
                if (resp.ok) {
                    const config = await resp.json();
                    if (applyConfig(config)) {
                        setTimeout(() => {
                            showToast('已自动加载 config.json 配置，可以开始使用。', 'success', 4000);
                        }, 500);
                    }
                }
            } catch (e) {
                // Server might not be running (file:// protocol)
                setTimeout(() => {
                    showToast('请通过 start.bat 启动应用以自动加载配置。', 'info', 5000);
                }, 500);
            }

            updateApiStatus();
            showPage('home');

            // Resume polling for any running video tasks from previous session
            window._videoTaskHistory.filter(t => t.status === 'running').forEach(t => {
                const pollUrl = t.type === 'enhance'
                    ? '/api/video/enhance/status?task_id=' + t.id
                    : '/api/video/status?task_id=' + t.id;
                const bgTask = {
                    id: t.id,
                    type: t.type,
                    subdir: t.subdir,
                    filename: t.filename,
                    prompt: t.prompt,
                    pollUrl: pollUrl,
                    initialStatus: '',
                    initialData: {},
                    startTime: t.startTime,
                    statusText: t.statusText || '恢复轮询中...'
                };
                addBgTask(bgTask);
                pollAndSave(bgTask);
            });
        }

        // Start the app
        init();

        // ========== StoryBoard Page ==========
        function renderStoryboardPage(container) {
            if (!container) container = document.getElementById('page-content');
            container.style.cssText = 'display:flex;flex-direction:column;height:100%';
            container.innerHTML = '<div id="storyboard-app" style="width:100%;flex:1;min-height:0;display:flex;flex-direction:column"><div style="flex:1;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px" id="sb-loading">StoryBoard 加载中...</div></div>';
            let _sbAttempts = 0;
            function tryMount() {
                const el = document.getElementById('storyboard-app');
                if (!el) return;
                if (window.__storyboardMount) {
                    window.__storyboardMount(el, state);
                } else {
                    _sbAttempts++;
                    if (_sbAttempts > 100) {
                        el.innerHTML = '<div style="text-align:center"><p style="color:#ef4444;font-size:14px">StoryBoard 模块加载超时</p><p style="color:#94a3b8;font-size:12px;margin-top:8px">请检查网络连接后刷新页面重试（需要访问 esm.sh CDN）</p><button onclick="location.reload()" style="margin-top:12px;padding:6px 16px;border-radius:6px;background:#6366f1;color:#fff;border:none;cursor:pointer;font-size:13px">刷新页面</button></div>';
                        return;
                    }
                    setTimeout(tryMount, 100);
                }
            }
            tryMount();
            // Trigger module load if not already started
            if (!window.__storyboardMount && typeof window.__loadStoryboard === 'function') {
                window.__loadStoryboard();
            }
        }
    </script>
    <script type="module">
        window.__loadStoryboard = async function() {
            try {
                const sb = await import('/web/storyboard.js');
                window.__storyboardMount = sb.mount;
                window.__storyboardUnmount = sb.unmount;
                // Auto-mount if storyboard page is already visible
                const el = document.getElementById('storyboard-app');
                if (el) {
                    sb.mount(el, window.state);
                }
            } catch(e) {
                console.error('[StoryBoard] 模块加载失败:', e);
                const el = document.getElementById('storyboard-app');
                if (el) {
                    el.innerHTML = '<div style="text-align:center;max-width:500px"><p style="color:#ef4444;font-size:14px">StoryBoard 模块加载失败</p><p style="color:#94a3b8;font-size:12px;margin-top:8px;word-break:break-all">' + (e.message || e) + '</p><button onclick="location.reload()" style="margin-top:12px;padding:6px 16px;border-radius:6px;background:#6366f1;color:#fff;border:none;cursor:pointer;font-size:13px">刷新页面</button></div>';
                }
            }
        };
        // Auto-start loading
        window.__loadStoryboard();
    </script>
</body>
</html>
